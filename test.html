<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Neon Quiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary-neon: #00f3ff; /* Cyan neon */
            --secondary-neon: #bc13fe; /* Purple neon */
            --bg-color: #050510;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --success: #00ff9d;
            --error: #ff0055;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: floatBlob 10s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-neon);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary-neon);
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Main Glass Container */
        .app-container {
            width: 90%;
            max-width: 750px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            overflow: hidden;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            animation: fadeIn 0.5s ease forwards;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Start Screen */
        .start-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 20px;
        }

        .big-icon {
            font-size: 6rem;
            filter: drop-shadow(0 0 15px var(--primary-neon));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Buttons */
        .btn-neon {
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--bg-color);
            background: var(--primary-neon);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--primary-neon);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 30px;
        }

        .btn-neon:hover {
            background: #fff;
            box-shadow: 0 0 30px var(--primary-neon);
            transform: scale(1.05);
        }

        .btn-neon:disabled {
            background: var(--glass-border);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Quiz Layout */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-track {
            flex-grow: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin: 0 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--primary-neon);
        }

        .question-text {
            font-size: 1.6rem;
            margin-bottom: 30px;
            line-height: 1.4;
            font-weight: 600;
        }

        /* Options */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            border-radius: 16px;
            color: var(--text-color);
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-neon);
            transform: translateX(10px);
        }

        .option-btn.selected {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .option-btn.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: var(--primary-neon);
        }

        /* Result Screen */
        .result-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .score-display {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary-neon);
            text-shadow: 0 0 30px var(--primary-neon);
            margin-bottom: 10px;
        }

        .score-label {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        .stat-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .feedback-msg {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .app-container { padding: 25px; width: 95%; min-height: 100vh; border-radius: 0; border: none; }
            .stats-row { flex-direction: column; width: 100%; gap: 10px; }
            .stat-item { width: 100%; }
            .option-btn { padding: 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Background Blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="app-container">
        <header>
            <h1>Python Cyber</h1>
            <p class="subtitle">OOP • Bots • Databases</p>
        </header>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active start-content">
            <div class="big-icon">💠</div>
            <h2 style="font-size: 2rem;">Tizimni sinang</h2>
            <p style="color: var(--text-muted); max-width: 400px; line-height: 1.6;">
                Python dasturlash bo‘yicha 30 ta murakkab savol. OOP asoslari, Telegram botlar va SQL ma'lumotlar bazalari.
            </p>
            <button class="btn-neon" onclick="startQuiz()">Start</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <span id="topic-badge">OOP</span>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>
                <span id="question-counter">1/30</span>
            </div>

            <h3 id="question-text" class="question-text">Savol yuklanmoqda...</h3>

            <div id="options-container" class="options-list">
                <!-- Options injected here -->
            </div>

            <div style="margin-top: auto; text-align: right;">
                <button id="next-btn" class="btn-neon" onclick="nextQuestion()" disabled style="font-size: 1rem; padding: 12px 30px; margin-top: 20px;">Keyingi</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen result-content">
            <div class="score-display" id="final-score">0</div>
            <div class="score-label">Topilgan Ball</div>
            
            <h2 class="feedback-msg" id="feedback-msg">Yaxshi</h2>
            <p id="feedback-detail" style="color: var(--text-muted); margin-bottom: 30px; max-width: 500px;">
                Natijangiz.
            </p>

            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-num" id="correct-count" style="color: var(--success)">0</span>
                    <span class="stat-desc">To'g'ri</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="wrong-count" style="color: var(--error)">0</span>
                    <span class="stat-desc">Noto'g'ri</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="percent-count">0%</span>
                    <span class="stat-desc">Foiz</span>
                </div>
            </div>

            <button class="btn-neon" onclick="restartQuiz()">Qayta boshlash</button>
        </div>
    </div>

    <script>
        const questions = [
            // OOP
            { topic: "OOP", q: "Python da obyekt nima?", options: ["Kod satrlari", "Klassdan yaratilgan nusxa (instance)", "Funktsiya to‘plami", "O‘zgaruvchi"], a: 1 },
            { topic: "OOP", q: "`__init__` metodi nima qiladi?", options: ["Dasturni o‘chiradi", "Obyekt yaratilganda xususiyatlarni boshlaydi", "Matn chop etadi", "Hisoblaydi"], a: 1 },
            { topic: "Inkapsulyatsiya", q: "O‘zgaruvchini 'private' qilish uchun qanday prefiks ishlatiladi?", options: ["#", "_", "__", "*"], a: 2 },
            { topic: "Inkapsulyatsiya", q: "`@property` dekoratori nima uchun kerak?", options: ["O‘chirish uchun", "Getter funksiyasini atribut kabi ishlatish uchun", "Yaratish uchun", "Sekinlashtirish uchun"], a: 1 },
            { topic: "Merosxo‘rlik", q: "Inheritance nima?", options: ["Ota klass xususiyatlarini o‘g‘il klassga o‘tkazish", "Yashirish", "Qayta yozish", "Bog‘lash"], a: 0 },
            { topic: "Merosxo‘rlik", q: "`super()` funksiyasi nimani ifodalaydi?", options: ["O‘g‘il klassni", "Ota klassni metodlarini chaqirishni", "Obyektni", "Global o‘zgaruvchini"], a: 1 },
            { topic: "Merosxo‘rlik", q: "Ko‘p darajali merosxo‘rlik (Multilevel) degani nimani anglatadi?", options: ["Bir nechta otadan meros olish", "Ketma-ket (A->B->C) meros olish", "Faqat bitta otadan", "Meros yo‘q"], a: 1 },
            { topic: "Polimorfizm", q: "Polimorfizm nimani bildiradi?", options: ["Ko‘plab klass", "Bir xil nomli metodning turlicha ishlashi", "Kod qisqartirish", "Obyekt ko‘paytirish"], a: 1 },
            { topic: "Polimorfizm", q: "Operator Overloading nima?", options: ["Operator o‘chirish", "Operatorni (+, -) klass uchun qayta ta’riflash", "Yangi operator", "Funksiyalashtirish"], a: 1 },
            { topic: "Abstraksiya", q: "Abstrakt klassdan obyekt yaratiladimi?", options: ["Ha", "Yo‘q, faqat meros olish uchun", "Faqat funksiya bilan", "Shart emas"], a: 1 },
            { topic: "Magic Methods", q: "`__str__` qachon ishlaydi?", options: ["Qo‘shganda", "Print(obj) qilganda", "O‘chirganda", "Solishtirganda"], a: 1 },
            { topic: "Magic Methods", q: "`__add__` metodi qaysi operator bilan bog‘liq?", options: ["-", "+", "*", "/"], a: 1 },
            { topic: "Magic Methods", q: "`__len__` metodi qaysi buyruq bilan ishlaydi?", options: ["len()", "str()", "int()", "print()"], a: 0 },
            { topic: "Modullar", q: "Modul nima?", options: ["DB fayli", ".py kengatmali Python fayli", "Rasm", "Dastur"], a: 1 },
            { topic: "Modullar", q: "`__name__` == '__main__' nima degani?", options: ["Fayl nomi", "Fayl to‘g‘ridan-to‘g‘ri ishga tushirilgan", "Fayl o‘chirilgan", "Xatolik"], a: 1 },
            
            // Telegram Bot
            { topic: "Telegram Bot", q: "Bot nima?", options: ["Inson foydalanuvchi", "Avtomatik dastur", "Server", "Virus"], a: 1 },
            { topic: "Telegram Bot", q: "Bot qayerda ishlamaydi?", options: ["Xizmatlarda", "Guruhlarda", "Serverlarni jismoniy ta'mirlashda", "Do'konda"], a: 2 },
            { topic: "Bot API", q: "Bot API orqali nima qilib bo‘lmaydi?", options: ["Xabar yuborish", "Tugma yasash", "Telefon qo‘ng‘iroq", "Fayl yuborish"], a: 2 },
            { topic: "Bot API", q: "Polling usuli nima?", options: ["Server botga murojaat qiladi", "Bot serverga so‘rov yuborib turadi", "Foydalanuvchi yozadi", "Admin javob beradi"], a: 1 },
            { topic: "Yaratish", q: "Bot yaratish uchun qaysi bot kerak?", options: ["@Admin", "@BotFather", "@UserBot", "@Support"], a: 1 },
            { topic: "Kutubxonalar", q: "Eng mashhur asinxron bot kutubxonasi?", options: ["requests", "pandas", "aiogram", "flask"], a: 2 },
            { topic: "Kutubxonalar", q: "python-telegram-bot qanday yondashuvda ishlaydi?", options: ["Procedural", "OOP (Object Oriented)", "Functional", "Hybrid"], a: 1 },
            { topic: "Handler", q: "Handler nima?", options: ["Bot nomi", "Xabarni qabul qilib funksiyani ishga tushiruvchi qism", "Token", "Rasm"], a: 1 },
            { topic: "Keyboards", q: "ReplyKeyboardMarkup qanday klaviatura?", options: ["O‘rnatiladigan (inline)", "Asosiy ekranda doim turadigan", "Ovozli", "Video"], a: 1 },
            { topic: "Filters", q: "aiogram da `Command('start')` nima qiladi?", options: ["Barcha xabalarni oladi", "Faqat /start buyrug‘ini tutadi", "Xabarni o‘chiradi", "Botni to‘xtatadi"], a: 1 },

            // SQL / Database
            { topic: "Database", q: "SQL nima?", options: ["Dasturlash tili", "Ma'lumotlar bazasi bilan ishlash tili", "Design tili", "Markap tili"], a: 1 },
            { topic: "Database", q: "Python da standart SQL kutubxonasi?", options: ["sqlite3", "sql", "pydb", "mysqldb"], a: 0 },
            { topic: "SQL Query", q: "`SELECT * FROM users` nima qiladi?", options: ["O‘chiradi", "Barcha ma'lumotlarni oladi", "Yangilaydi", "Yaratadi"], a: 1 },
            { topic: "SQL Keys", q: "`PRIMARY KEY` nima?", options: ["Jadval nomi", "Noyob identifikator", "Ma'lumot turi", "Tashqi kalit"], a: 1 },
            { topic: "Security", q: "SQL Injection nima?", options: ["Virus", "Kod orqali so‘rovni buzib ma'lumot olish", "Internet tezligi", "Bot xatosi"], a: 1 },
            { topic: "SQL Join", q: "JOIN so‘rovi nima qiladi?", options: ["Jadvalni o‘chiradi", "Ikki yoki undan ortiq jadvallarni bog‘laydi", "Yangi DB yaratadi", "Faylni yuklaydi"], a: 1 },
            { topic: "SQL Data", q: "INSERT so‘rovi qanday ishlaydi?", options: ["O'qish (Read)", "Yangi ma'lumot qo'shish (Create)", "O'zgartirish (Update)", "O'chirish (Delete)"], a: 1 },
            { topic: "SQL Data", q: "UPDATE so‘rovi nimaga xizmat qiladi?", options: ["Ma'lumot o'zgartirish", "Ma'lumot o'chirish", "Ma'lumot qo'shish", "Ma'lumot o'qish"], a: 0 },
            { topic: "SQLite", q: "SQLite nima?", options: ["Serverli DB", "Serverliksiz, faylga asoslangan yengil DB", "Onlayn xizmat", "Dastur"], a: 1 },
            { topic: "SQL Aggregation", q: "`COUNT(*)` funksiyasi nima qiladi?", options: ["Yig'indini hisoblaydi", "Qatorlar sonini sanaydi", "O'rtachani topadi", "Maksimumni topadi"], a: 1 }
        ];

        let currentQIndex = 0;
        let score = 0;
        let userAnswers = new Array(questions.length).fill(null);

        // DOM Elements
        const screens = document.querySelectorAll('.screen');
        const startBtn = document.querySelector('#start-screen .btn-neon');
        const nextBtn = document.getElementById('next-btn');
        
        function switchScreen(id) {
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQuiz() {
            currentQIndex = 0;
            score = 0;
            userAnswers = new Array(questions.length).fill(null);
            switchScreen('quiz-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQIndex];
            
            // Update Header
            document.getElementById('topic-badge').innerText = q.topic;
            document.getElementById('question-counter').innerText = `${currentQIndex + 1}/${questions.length}`;
            
            // Update Progress
            const pct = ((currentQIndex) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;

            // Text
            document.getElementById('question-text').innerText = q.q;

            // Options
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span style="opacity:0.6; margin-right:10px;">${String.fromCharCode(65+idx)}.</span> ${opt}`;
                btn.onclick = () => selectOption(idx, btn);
                
                // Restore selection if going back (not implemented here but good practice)
                if(userAnswers[currentQIndex] === idx) {
                    btn.classList.add('selected');
                }
                
                container.appendChild(btn);
            });

            nextBtn.disabled = true;
            nextBtn.innerText = currentQIndex === questions.length - 1 ? "Yakunlash" : "Keyingi";
        }

        function selectOption(idx, btn) {
            // Remove selected class from siblings
            const siblings = btn.parentElement.children;
            for(let sib of siblings) sib.classList.remove('selected');
            
            // Add to clicked
            btn.classList.add('selected');
            
            userAnswers[currentQIndex] = idx;
            nextBtn.disabled = false;
        }

        function nextQuestion() {
            // Calculate score immediately
            if (userAnswers[currentQIndex] === questions[currentQIndex].a) {
                score++;
            }

            currentQIndex++;

            if (currentQIndex < questions.length) {
                // Simple transition effect
                const qScreen = document.getElementById('quiz-screen');
                qScreen.style.opacity = 0;
                setTimeout(() => {
                    loadQuestion();
                    qScreen.style.opacity = 1;
                }, 200);
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('progress-bar').style.width = '100%';
            switchScreen('result-screen');

            const percent = Math.round((score / questions.length) * 100);
            
            // Animate Score Number
            const scoreEl = document.getElementById('final-score');
            let currentScore = 0;
            const timer = setInterval(() => {
                if(currentScore >= percent) clearInterval(timer);
                else {
                    currentScore++;
                    scoreEl.innerText = currentScore;
                }
            }, 20);

            document.getElementById('correct-count').innerText = score;
            document.getElementById('wrong-count').innerText = questions.length - score;
            document.getElementById('percent-count').innerText = percent + '%';

            const msg = document.getElementById('feedback-msg');
            const detail = document.getElementById('feedback-detail');

            if(percent === 100) {
                msg.innerText = "Cyber Legend!";
                msg.style.color = "var(--success)";
                detail.innerText = "Siz 30/30 natija qayd etdingiz. Python Master!";
            } else if(percent >= 80) {
                msg.innerText = "Excellent!";
                msg.style.color = "var(--primary-neon)";
                detail.innerText = "Juda yaxshi natija. Sizda mustahkam bilimlar bor.";
            } else if(percent >= 50) {
                msg.innerText = "Good Job";
                msg.style.color = "var(--secondary-neon)";
                detail.innerText = "Yarim yo‘l o‘tdingiz. Ba'zi mavzularni takrorlang.";
            } else {
                msg.innerText = "Try Again";
                msg.style.color = "var(--error)";
                detail.innerText = "Bilimlaringizni mustahkamlash uchun ko‘proq mashq qiling.";
            }
        }

        function restartQuiz() {
            switchScreen('start-screen');
        }
    </script>
</body>
</html>
